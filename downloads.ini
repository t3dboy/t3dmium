# Archives fetched by tools/fetch.py.
# Format (per section):
#   url               - download URL ({version} is replaced with chromium_version.txt)
#   download_filename - name of the file in the download cache
#   sha256            - expected hash of the archive
#   output_path       - extraction destination, relative to build/
#   strip_leading_dirs- number of leading path components to strip when extracting
#
# The sha256 below is taken from the .hashes file published alongside the
# official tarball at commondatastorage.googleapis.com (verified 2026-07-07).

[chromium]
url = https://commondatastorage.googleapis.com/chromium-browser-official/chromium-{version}.tar.xz
download_filename = chromium-{version}.tar.xz
sha256 = 0eee078c707ef5793fb5af4c89bba673917b884fbc2345c6295921d4e746e106
output_path = src
strip_leading_dirs = 1
