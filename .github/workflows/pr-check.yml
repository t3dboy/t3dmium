# Fast checks on every PR and push: conventions, patch validation against the
# pinned Chromium sources (remote per-file fetch — no checkout needed), and
# tool sanity. Full builds happen in release-build.yml.
name: pr-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Tools compile
        run: python -m compileall tools

      - name: Conventions
        run: python tools/check_conventions.py

      - name: Tarball reachable at pin
        run: python tools/fetch.py check

      - name: Patches apply to pinned sources (remote validation)
        run: python tools/validate_patches.py --remote
