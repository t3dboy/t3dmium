# Fast checks on every PR and push: conventions, patch validation against the
# pinned Chromium sources (remote per-file fetch — no checkout needed), and
# tool sanity. Full builds happen in release-build.yml.
name: pr-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Tools compile
        run: python -m compileall tools

      - name: Conventions
        run: python tools/check_conventions.py

      - name: Tarball reachable at pin
        run: python tools/fetch.py check

      - name: Cache pinned source files
        uses: actions/cache@v4
        with:
          path: build/gitiles_cache
          key: gitiles-${{ hashFiles('chromium_version.txt') }}-${{ hashFiles('patches/series') }}
          restore-keys: gitiles-${{ hashFiles('chromium_version.txt') }}-

      - name: Full series applies to pinned sources (remote validation)
        run: python tools/validate_patches.py --remote

      - name: Audit harness self-test (detection logic, no browser)
        run: python -m unittest discover -s audit/tests -v

      - name: Sync server test suite
        run: python -m unittest discover -s sync/tests -v
