<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="T3dmium">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b6cb0"/>
      <stop offset="1" stop-color="#1a365d"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cbd5e0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background: fills the whole canvas so macOS (incl. the
       macOS 26 icon system) can apply its own rounded-square mask cleanly.
       No transparent margin, no self-rounding. -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!-- Privacy shield, centred within the safe area -->
  <path d="M256 116 L384 164 V276 C384 348 328 396 256 420 C184 396 128 348 128 276 V164 Z"
        fill="url(#shield)"/>

  <!-- Wordmark 'T3d' -->
  <text x="256" y="304" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-weight="700"
        font-size="124" fill="#1a365d">T3d</text>
</svg>
